<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Project</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">

</head>
<body>

    <div class="container">
        <div class="card">
            <img src="pngtree-school-logo-png-image_6851480.png" alt="School Logo">
            <h1 class="text-dark">Student Portal Login</h1>

            <button type="button" class="btn btn-sm btn-outline-warning mb-1 mt-3 center" 
            onclick="alert('To log in, enter Username: student & Password: summerbreaksoon')">View Login Help</button>
            <hr>

            <label class="text-dark">Username</h3>
            <input type="text" class="form-control" id="usernameEntry">
            <br>
            <label class="text-dark">Password</h3>
            <input type="text" class="form-control" id="passwordEntry">

            <input type="checkbox" class="mt-4">
            <label>Stay logged in?</label><br>
            <p class="mb-4"><i>Your session will stay active on this device.</i></p>

            <p id="result" class="text-muted mt-2"></p>
            <button type="button" class="btn btn-warning" onclick="loginUser()">Log In</button>
        
            <hr>
            <p class="mb-3"><u>Forgot password?</u></p>
        </div>
    </div>

<script src="main.js"></script>
</body>
</html>
